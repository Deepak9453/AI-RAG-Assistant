<!DOCTYPE html>
<html>
<head>
    <title>AI Document Analyzer</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            margin:0;
            padding:0;
        }

        .container{
            width:500px;
            margin:120px auto;
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 4px 20px rgba(0,0,0,0.1);
            text-align:center;
        }

        h1{
            color:#333;
            margin-bottom:20px;
        }

        input[type=file]{
            padding:10px;
            margin:20px 0;
        }

        button{
            background:#007bff;
            border:none;
            padding:12px 20px;
            color:white;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

    </style>

</head>

<body>

<div class="container">

<h1>AI Document Analyzer</h1>

<p>Upload a PDF or DOCX to generate summary, MCQs and ask questions.</p>

<form action="/upload" method="POST" enctype="multipart/form-data">

<input type="file" name="file" required>

<br>

<button type="submit">Upload Document</button>

</form>

</div>

</body>
</html>
