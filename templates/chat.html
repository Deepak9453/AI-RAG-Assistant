<!DOCTYPE html>
<html>
<head>

<title>Document Analysis</title>

<style>

body{
    font-family:Arial;
    background:#f5f7fb;
    margin:0;
}

.header{
    background:#1f2937;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}

.container{
    width:90%;
    margin:auto;
    margin-top:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:8px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
    margin-top:0;
}

textarea{
    width:100%;
    height:100px;
}

button{
    background:#2563eb;
    border:none;
    color:white;
    padding:10px 18px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1e40af;
}

.answer{
    background:#eef2ff;
    padding:15px;
    margin-top:10px;
    border-radius:5px;
}

.mcq{
    white-space:pre-wrap;
    line-height:1.6;
}

</style>

</head>

<body>

<div class="header">
AI Document Intelligence
</div>

<div class="container">


<div class="card">

<h2>Document Summary</h2>

<p>{{summary}}</p>

</div>


<div class="card">

<h2>Generated MCQs</h2>

<div class="mcq">

{{mcqs}}

</div>

</div>


<div class="card">

<h2>Ask Question</h2>

<form action="/ask" method="POST">

<textarea name="question" placeholder="Ask something about the document..." required></textarea>

<br><br>

<button type="submit">Ask</button>

</form>

{% if answer %}

<div class="answer">

<h3>Answer</h3>

<p>{{answer}}</p>

</div>

{% endif %}

</div>

</div>

</body>
</html>
